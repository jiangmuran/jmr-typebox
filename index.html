<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>TypeBox — Markdown Editor & Format Converter</title>
  <meta name="description" content="Lightweight Markdown editor with live preview, format conversion, and multi-format export. No login, works offline.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "212b43858f8a4b9c8cf9f1f6c060f413"}'></script>
  <!-- End Cloudflare Web Analytics -->
  <script>
    // Apply persisted appearance before paint to avoid flash / hydration mismatch.
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem('tb-settings') || '{}')
        var t = s.theme || 'system'
        if (t === 'system') t = window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'
        document.documentElement.dataset.theme = t
        if (s.density) document.documentElement.dataset.density = s.density
        if (s.accent) document.documentElement.style.setProperty('--accent', s.accent)
      } catch (e) {}
    })()
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
