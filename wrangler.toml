name = "typebox"
main = "worker/index.js"
compatibility_date = "2025-01-01"
workers_dev = true

# Bind the custom domain (Cloudflare manages the DNS record for it).
routes = [
  { pattern = "box.muran.tech", custom_domain = true },
]

# Serve the built static frontend; the Worker runs first for /api/* then falls through.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Globally-consistent per-IP rate limiting (Durable Object) for the abuse-prone proxy endpoints.
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

# Phase 3: admin auth state (bootstrap token, passkeys, one-time links, NCM cookie, IP allowlist).
# A SINGLETON instance — idFromName('singleton') in worker/lib/musicAuth.js#callAuth.
[[durable_objects.bindings]]
name = "MUSIC_AUTH"
class_name = "MusicAuth"

# NO new-class migrations here on purpose: BOTH RateLimiter and MusicAuth already exist in
# production with live objects, and the deployed script carries no migration tag — so any
# [[migrations]] new_sqlite_classes entry gets replayed on deploy and Cloudflare rejects it
# (code 10074 "already depended on by existing Durable Objects"). Introduce FUTURE DO classes
# with a fresh tag; don't re-declare these two.

# Invisible-watermark verify records (id -> {content,timestamp,version,createdAt}).
# Create the namespace and paste its printed id here:
#   npx wrangler kv namespace create WATERMARKS
# Local `wrangler dev` and unit tests do not need the id (Miniflare / a mock provide the binding);
# it is only required for production deploy.
[[kv_namespaces]]
binding = "WATERMARKS"
id = "51c35a9ea1ab4dc396865493d7b19b79"

# ─── Music player secrets (optional but required for the /api/music/* surface) ───────────────
# Set with:  npx wrangler secret put NCM_COOKIE    (paste your MUSIC_U cookie from devtools)
#           npx wrangler secret put ALLOWED_IPS    (comma-separated, e.g. "1.2.3.4,5.6.7.8")
#           npx wrangler secret put AUTH_SECRET    (random 32+ char string for JWT signing)
#           npx wrangler secret put BOOTSTRAP_TOKEN (one-time token to bind the first passkey)
# Without NCM_COOKIE: search/playlist/lyric still work (anonymous), but song/url/stream fail.
# Without ALLOWED_IPS: /api/music/* is OPEN to any IP (only rate-limited); /api/admin/* is
#                      hard-closed (returns 403 to everyone). Set ALLOWED_IPS in production.
# Without AUTH_SECRET: /api/auth/* + /api/admin/* return 503 (admin surface disabled).
# Without BOOTSTRAP_TOKEN: the /admin page shows "set BOOTSTRAP_TOKEN first" instead of the
#                          bind-passkey flow. Set it ONCE, then bind a passkey, then it's dead.
# These are read at runtime via env.* — no entry needed here.
